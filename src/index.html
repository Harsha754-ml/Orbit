<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Layer 1: Runtime Overlay -->
    <div id="orbit-overlay" class="orbit-overlay">
      <div id="ripple-container" class="ripple-container"></div>
      <div id="radial-menu" class="radial-menu">
        <div class="radial-menu-center">
          <div id="center-piece" class="center-piece idle"></div>
        </div>
      </div>
      <div id="hover-label" class="hover-label"></div>
      <div id="dev-overlay" class="dev-overlay"></div>
      <div id="icon-context-menu" class="icon-context-menu">
        <div
          class="menu-option delete"
          onclick="handleContextMenuAction('delete')"
        >
          <span class="option-icon">🗑️</span> Delete
        </div>
        <div class="menu-option nest" onclick="handleContextMenuAction('nest')">
          <span class="option-icon">📂</span> Nest Into Group
        </div>
        <div class="menu-option move" onclick="handleContextMenuAction('move')">
          <span class="option-icon">↔️</span> Move To
        </div>
      </div>
      <div id="debug-panel" class="debug-panel"></div>
    </div>

    <!-- Layer 1.5: Command Palette -->
    <div id="command-palette" class="palette-container">
      <input
        type="text"
        id="palette-search"
        placeholder="Type to search..."
        autocomplete="off"
      />
      <div id="palette-results" class="palette-results"></div>
    </div>

    <!-- Layer 2: Edit Mode Modal (conditionally rendered) -->
    <div id="edit-modal-overlay" class="edit-modal-overlay">
      <div class="edit-modal">
        <div class="edit-modal-header">
          <span class="edit-modal-title">Add Custom Action</span>
          <button class="edit-modal-close" onclick="closeModal()">
            &times;
          </button>
        </div>
        <div class="edit-modal-body">
          <label class="edit-label">Label</label>
          <input
            type="text"
            id="action-label"
            class="edit-input"
            placeholder="e.g. My App"
          />
          <label class="edit-label">Path or URL</label>
          <input
            type="text"
            id="action-path"
            class="edit-input"
            placeholder="C:\\path\\to\\app.exe or https://..."
          />
          <label class="edit-label">Icon (optional)</label>
          <input
            type="text"
            id="action-icon"
            class="edit-input"
            placeholder="e.g. custom.svg"
          />
        </div>
        <div class="edit-modal-footer">
          <button class="edit-btn secondary" onclick="closeModal()">
            Cancel
          </button>
          <button class="edit-btn primary" onclick="submitAction()">
            Add Action
          </button>
        </div>
      </div>
    </div>

    <!-- Plugin Widgets — always-on display overlay (bottom-right stack) -->
    <div id="plugin-widgets" class="plugin-widgets-container">

      <div id="widget-sysmon" class="plugin-widget hidden">
        <div class="widget-header">
          <span class="widget-icon">💻</span>System Monitor
          <button class="widget-close" onclick="toggleWidget('sysmon')">×</button>
        </div>
        <div class="widget-body">
          <div class="widget-row">
            <span class="widget-label">CPU</span>
            <div class="progress-bar"><div id="cpu-bar" class="progress-fill cpu-fill"></div></div>
            <span id="cpu-val" class="widget-val">0%</span>
          </div>
          <div class="widget-row">
            <span class="widget-label">RAM</span>
            <div class="progress-bar"><div id="ram-bar" class="progress-fill ram-fill"></div></div>
            <span id="ram-val" class="widget-val">0%</span>
          </div>
          <div id="sysmon-uptime" class="widget-sub"></div>
        </div>
      </div>

      <div id="widget-pomodoro" class="plugin-widget hidden">
        <div class="widget-header">
          <span class="widget-icon">🍅</span>Pomodoro
          <button class="widget-close" onclick="toggleWidget('pomodoro')">×</button>
        </div>
        <div class="widget-body center">
          <div id="pomodoro-display" class="pomodoro-timer">25:00</div>
          <div id="pomodoro-state" class="pomodoro-state">Ready to focus</div>
        </div>
      </div>

      <div id="widget-weather" class="plugin-widget hidden">
        <div class="widget-header">
          <span class="widget-icon">🌤️</span>Weather
          <button class="widget-close" onclick="toggleWidget('weather')">×</button>
        </div>
        <div id="weather-body" class="widget-body">
          <div id="weather-condition" class="weather-condition">Loading...</div>
          <div id="weather-temp" class="weather-temp"></div>
          <div id="weather-details" class="weather-details"></div>
        </div>
      </div>

      <div id="widget-clipboard" class="plugin-widget hidden">
        <div class="widget-header">
          <span class="widget-icon">📋</span>Clipboard History
          <button class="widget-close" onclick="toggleWidget('clipboard')">×</button>
        </div>
        <div id="clipboard-list" class="clipboard-list"></div>
      </div>

      <div id="widget-notes" class="plugin-widget hidden">
        <div class="widget-header">
          <span class="widget-icon">📝</span>Quick Notes
          <button class="widget-close" onclick="toggleWidget('notes')">×</button>
        </div>
        <div id="notes-body" class="notes-body"></div>
      </div>

      <div id="widget-app-switcher" class="plugin-widget hidden">
        <div class="widget-header">
          <span class="widget-icon">🪟</span>Open Windows
          <button class="widget-close" onclick="toggleWidget('app-switcher')">×</button>
        </div>
        <div id="app-switcher-list" class="clipboard-list"></div>
      </div>

      <div id="widget-script-runner" class="plugin-widget hidden">
        <div class="widget-header">
          <span class="widget-icon">⚡</span>Script Output
          <button class="widget-close" onclick="toggleWidget('script-runner')">×</button>
        </div>
        <div id="script-runner-label" class="script-runner-label"></div>
        <div id="script-runner-output" class="script-runner-output"></div>
      </div>

      <div id="widget-focus-mode" class="plugin-widget hidden">
        <div class="widget-header">
          <span class="widget-icon">🎯</span>Focus Mode
          <button class="widget-close" onclick="toggleWidget('focus-mode')">×</button>
        </div>
        <div class="widget-body center">
          <div id="focus-mode-status" class="focus-status inactive">● Inactive</div>
          <div id="focus-mode-blocklist" class="focus-blocklist"></div>
        </div>
      </div>

    </div>

    <!-- Plugin Management Panel -->
    <div id="plugin-panel-overlay" class="plugin-panel-overlay">
      <div class="plugin-panel">
        <div class="plugin-panel-header">
          <span class="plugin-panel-title">🔌 Plugins</span>
          <button class="plugin-panel-close" onclick="closePluginPanel()">×</button>
        </div>
        <div id="plugin-list-container" class="plugin-list-container"></div>
        <div class="plugin-panel-footer">
          <button class="plugin-action-btn" onclick="window.orbitAPI.openPluginsFolder()">
            📁 Open Plugins Folder
          </button>
          <span class="plugin-hint">Drop a .js plugin file in that folder and restart</span>
        </div>
      </div>
    </div>

    <audio id="sound-expand"   src="assets/expand.mp3"></audio>
    <audio id="sound-collapse" src="assets/collapse.mp3"></audio>
    <audio id="sound-execute"  src="assets/execute.mp3"></audio>
    <script src="renderer.js"></script>
  </body>
</html>
